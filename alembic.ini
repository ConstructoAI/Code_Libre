# ============================================
# Alembic Configuration - ERP Constructo AI
# ============================================
# Configuration des migrations de base de données

[alembic]
# Chemin vers le dossier des migrations
script_location = alembic

# Template pour les fichiers de migration
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Utiliser dateutil pour les timestamps
# (nécessite python-dateutil)
# timezone = UTC

# Truncate les noms de révision longs
truncate_slug_length = 40

# Afficher le SQL généré dans les logs
# sqlalchemy.url = driver://user:pass@localhost/dbname
# Note: On utilise DATABASE_URL depuis les variables d'environnement

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
