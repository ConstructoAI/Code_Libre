name: Security scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Lundi 06:00 UTC = lundi 02:00 EDT — bonne fenêtre pour signaler les nouvelles CVE
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  python-vuln-scan:
    name: pip-audit (Python deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Scan production requirements
        run: pip-audit -r requirements.txt --vulnerability-service osv --strict
      - name: Scan test requirements
        run: pip-audit -r requirements-test.txt --vulnerability-service osv --strict
        continue-on-error: true

  npm-vuln-scan:
    name: npm audit (frontend deps)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [ERP_REACT, MOBILE_REACT, SEAOP_REACT]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: npm audit (production deps, high+)
        working-directory: ${{ matrix.app }}/frontend
        run: |
          npm install --package-lock-only --ignore-scripts
          npm audit --omit=dev --audit-level=high

  secret-scan:
    name: Gitleaks (secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    name: CodeQL (static analysis)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
      - uses: github/codeql-action/analyze@v3
