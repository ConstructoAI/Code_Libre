# ===================================
# Configuration pytest - ERP Constructo AI
# ===================================

[pytest]
# Chemins des tests
testpaths = ERP_REACT/backend/tests

# Pattern des fichiers de tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Options par défaut (coverage désactivé par défaut, activer avec: pytest --cov)
addopts =
    --verbose
    --strict-markers
    --tb=short
    -ra
    --color=yes

# Markers personnalisés
markers =
    unit: Tests unitaires rapides
    integration: Tests d'integration (peuvent etre lents)
    security: Tests de securite
    performance: Tests de performance
    slow: Tests lents (>5 secondes)
    database: Tests necesitant la base de donnees
    api: Tests des APIs
    ui: Tests interface utilisateur

# Timeout par défaut (30 secondes)
timeout = 30

# Ignorer certains warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Coverage - Fichiers à exclure
[coverage:run]
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */ENV/*
    */env/*
    setup.py
    conftest.py

[coverage:report]
# Ignorer fichiers avec peu de lignes
skip_empty = True

# Exclure certaines lignes du coverage
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
